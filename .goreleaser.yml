version: 2

builds:
  - main: ./cmd/crm
    binary: crm
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/Array-Ventures/gtm-crm/internal/cli.Version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

checksum:
  name_template: 'checksums.txt'

# Homebrew tap publishing is intentionally omitted: there's no Array-Ventures/homebrew-tap
# repo yet, and a missing tap would fail `goreleaser release`. Releases ship the
# cross-platform binaries + checksums, which the gtm-plugin installer downloads
# directly. Re-add a `brews:` block once the tap repo + HOMEBREW_TAP_TOKEN exist.
